x-app-environment: &app-environment
  MEDIAOS_LOG_LEVEL: ${MEDIAOS_LOG_LEVEL:-INFO}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  MEDIAOS_PRIVATE_BUCKET: ${MEDIAOS_PRIVATE_BUCKET:-mediaos-private}
  MEDIAOS_UPLOAD_MAX_BYTES: ${MEDIAOS_UPLOAD_MAX_BYTES:-10485760}
  MEDIAOS_SESSION_TTL_SECONDS: ${MEDIAOS_SESSION_TTL_SECONDS:-28800}
  MEDIAOS_COOKIE_SECURE: ${MEDIAOS_COOKIE_SECURE:-false}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [mediaos]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [mediaos]

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["alembic", "-c", "backend/alembic.ini", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [mediaos]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "mediaos.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *app-environment
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/ready', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [mediaos]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "mediaos.worker.main"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,time; p=pathlib.Path('/tmp/mediaos-worker-ready'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime < 30 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [mediaos]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [mediaos]

volumes:
  postgres_data:
  minio_data:

networks:
  mediaos:
    driver: bridge
