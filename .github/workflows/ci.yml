name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture:
    name: Architecture and secret guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Phase 0 boundaries
        run: python scripts/check_architecture.py

  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mediaos_ci
          POSTGRES_PASSWORD: mediaos_ci_password
          POSTGRES_DB: mediaos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediaos_ci -d mediaos_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mediaos_ci
      POSTGRES_PASSWORD: mediaos_ci_password
      POSTGRES_DB: mediaos_ci
      MINIO_ROOT_USER: ci-user
      MINIO_ROOT_PASSWORD: ci-password
      MEDIAOS_RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check backend/src backend/tests scripts
      - name: Mypy
        run: mypy backend/src scripts
      - name: Pytest
        run: alembic -c backend/alembic.ini upgrade head && pytest backend/tests
      - name: Build package
        run: python -m build

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint:frontend
      - name: TypeScript
        run: npm run typecheck:frontend
      - name: Build frontend
        run: npm run build:frontend

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config
