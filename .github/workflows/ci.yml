name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture:
    name: Architecture and secret guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Phase 0.1 boundaries
        run: python scripts/check_architecture.py

  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check backend/src backend/tests scripts
      - name: Mypy
        run: mypy backend/src scripts
      - name: Pytest
        run: pytest backend/tests
      - name: Build package
        run: python -m build

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: ESLint
        run: npm run lint:frontend
      - name: TypeScript
        run: npm run typecheck:frontend
      - name: Build frontend
        run: npm run build:frontend

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config
